# Incremental update of the Steam app-id database (anonymous PICS),
# every 7 hours.
name: Update Steam app database

on:
  schedule:
    - cron: "17 */7 * * *" # every 7 hours (minute 17 to dodge top-of-hour congestion)
  workflow_dispatch:
    inputs:
      scan_to:
        description: "Backfill scan: 'auto' or an explicit id ceiling"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Dump app list (anonymous PICS, no keys)
        run: |
          EXTRA=""
          if [ -n "${{ github.event.inputs.scan_to }}" ]; then
            EXTRA="--scan-to ${{ github.event.inputs.scan_to }}"
          fi
          python dump_applist.py --data-dir data $EXTRA
      - name: Commit and push if changed
        run: |
          git config user.name "applist-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet && exit 0
          git commit -m "chore: update app database $(date -u +%Y-%m-%d)"
          git push
